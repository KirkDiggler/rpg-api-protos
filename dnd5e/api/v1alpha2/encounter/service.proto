syntax = "proto3";

package dnd5e.api.v1alpha2.encounter;

import "api/v1alpha2/core/ref.proto";
import "dnd5e/api/v1alpha2/encounter/events.proto";
import "dnd5e/api/v1alpha2/encounter/types.proto";

option go_package = "github.com/KirkDiggler/rpg-api-protos/gen/go/dnd5e/api/v1alpha2/encounter;encounterpb";
option java_multiple_files = true;
option java_package = "com.kirkdiggler.rpg.api.dnd5e.v1alpha2.encounter";

// =============================================================================
// RPC request / response messages
// =============================================================================

message GetEncounterRequest {
  string encounter_id = 1;
}

message GetEncounterResponse {
  Encounter encounter = 1;
}

message StreamEncounterRequest {
  string encounter_id = 1;
  // Deprecated: ignored; identity comes from auth context (matches
  // StreamLobbyRequest, which never carried a client-id field). See
  // rpg-api-protos#178.
  string player_id = 2 [deprecated = true];
  // Deprecated: never implemented; every (re)connect gets a full snapshot
  // resync. Resume-by-sequence, if built, will be designed fresh (rather
  // than wired onto this field) once rpg-toolkit#765 gives the initiative
  // roster its own real sequence number. See rpg-api-protos#178.
  optional int64 last_seen_sequence = 3 [deprecated = true];
}

message MoveEntityRequest {
  string encounter_id = 1;
  string entity_id = 2; // what's being moved
  Position destination = 3;
  repeated Position proposed_path = 4; // client's chosen path through the hex grid
  optional .api.v1alpha2.core.Ref movement_source = 5; // spell, ability, item powering this
}

message MoveEntityResponse {
  // Empty ack. World changes flow as events. The server may modify the path
  // (trap intercepts, OoM, opportunity attack, hidden difficult terrain) — events
  // report the actual outcome, not the proposal.
}

message InteractRequest {
  string encounter_id = 1;
  string target_entity_id = 2;
  optional string interaction_kind = 3; // optional: "open", "examine", "loot"
}

message InteractResponse {
  // World changes flow as events. This response carries only follow-ups
  // private to the caller (skill check prompts, dialogue choices).
  optional InputRequired input_required = 1;
}

message TakeActionRequest {
  string encounter_id = 1;
  string actor_entity_id = 2;
  // The toolkit's native action ref, two namespaces, not flattened:
  // {module:"dnd5e", type:"combat_abilities", id:"attack"} (the intent verb) or
  // {module:"dnd5e", type:"actions", id:"strike"} (a granted-capacity action).
  .api.v1alpha2.core.Ref action_ref = 3;
  ActionTarget target = 4;
  // Future: spell level, ki spend, etc.
}

message TakeActionResponse {
  optional InputRequired input_required = 1;
}

// ActionTarget is the union of how an action can be aimed.
message ActionTarget {
  oneof kind {
    string entity_id = 1;
    Position position = 2;
    AreaTarget area = 3;
    SelfTarget self = 4;
  }
}

message AreaTarget {
  Position center = 1;
  // Future: shape (cone, line, sphere, cube), size, orientation
}

message SelfTarget {}

message EndTurnRequest {
  string encounter_id = 1;
  string entity_id = 2;
}

message EndTurnResponse {}

// SubmitCheckRequest resolves the caller's currently-pending InputRequired prompt.
// No correlation id: server tracks pending_prompt_per_player. If none is pending,
// server returns FailedPrecondition.
//
// Wave 2.11d: take_reaction extends this RPC for reaction prompts. When the caller's
// pending prompt is a ReactionPrompt, the server interprets take_reaction as the
// reactor's choice (true = take the reaction, false = skip) and runs phase 2 of the
// attack with or without the reaction modifier baked in. The roll field is ignored
// in that case (reaction prompts don't carry a d20 roll).
message SubmitCheckRequest {
  string encounter_id = 1;
  string entity_id = 2;
  int32 roll = 3; // raw d20 result the client rolled (skill-check semantics)
  // When set on a request that resolves a ReactionPrompt, indicates whether the
  // reactor takes (true) or skips (false) the prompted reaction. Ignored for
  // non-reaction prompt kinds.
  optional bool take_reaction = 4;
  // Future: optional advantage/disadvantage, modifier breakdown
}

message SubmitCheckResponse {
  bool success = 1;
  int32 total = 2;
}

// SetReactionReadyRequest toggles whether a character has a specific reaction
// readied. Readiness is opt-in per the Wave 2.11d design: condition handlers only
// emit reaction triggers (and the server only pushes prompts) when the character
// has the relevant reaction readied.
//
// Default readiness varies by reaction type and is set server-side at encounter
// setup (free-cost reactions like OA are default-on for melee combatants;
// spell-cost reactions like Shield are default-off; class-feature reactions
// per-feature). Players use this RPC to override defaults.
//
// Spell-cost reactions auto-clear after firing (one-shot). Free reactions stay
// ready until the player toggles them off.
message SetReactionReadyRequest {
  string encounter_id = 1;
  string character_id = 2;
  // Which reaction to toggle. Examples: dnd5e:conditions:opportunity_attack,
  // dnd5e:spells:shield
  .api.v1alpha2.core.Ref reaction_ref = 3;
  // true = ready (will trigger prompts); false = unready (silent default)
  bool ready = 4;
}

message SetReactionReadyResponse {
  // Empty for now; success implied by no error.
  // Future: return resulting readiness map for the character so clients can confirm state.
}

message ActivateFeatureRequest {
  string encounter_id = 1;
  string character_id = 2;
  .api.v1alpha2.core.Ref feature_ref = 3; // e.g., {module:"dnd5e", type:"features", id:"rage"}
}

message ActivateFeatureResponse {
  // Empty ack — state changes (condition applied, charges decremented, action consumed)
  // flow via the existing EncounterEvent stream.
}

// =============================================================================
// Service
// =============================================================================

service EncounterService {
  // Lifecycle
  //
  // Encounter construction moved to lobby.v1alpha1.LobbyService.StartEncounter
  // (rpg-api-protos#176): a solo lobby is the one-player start path, so the old
  // single-caller CreateEncounter and the lobby's N-member seeding no longer
  // need to coexist as two divergent construction paths.
  rpc GetEncounter(GetEncounterRequest) returns (GetEncounterResponse);

  // Stream — primary state delivery channel.
  // Server sends an initial snapshot as the first event, then deltas. Every
  // (re)connect gets a full snapshot resync — there is no incremental
  // resume-by-sequence today (rpg-api-protos#178 removed the unimplemented
  // last_seen_sequence field; a real resume-by-sequence design is future work,
  // tracked separately).
  rpc StreamEncounter(StreamEncounterRequest) returns (stream EncounterEvent);

  // World actions — emit events on the stream. Caller-private follow-ups (skill check,
  // dialogue) come back in the response's InputRequired.
  rpc MoveEntity(MoveEntityRequest) returns (MoveEntityResponse);
  rpc Interact(InteractRequest) returns (InteractResponse);

  // Turn-based only — server returns FailedPrecondition if mode != TURN_BASED.
  rpc TakeAction(TakeActionRequest) returns (TakeActionResponse);
  rpc EndTurn(EndTurnRequest) returns (EndTurnResponse);

  // Resolves the caller's pending InputRequired prompt.
  // Returns FailedPrecondition if no prompt is pending.
  rpc SubmitCheck(SubmitCheckRequest) returns (SubmitCheckResponse);

  // SetReactionReady toggles whether a character has a specific reaction readied.
  // Wave 2.11d: opt-in readiness model. Conditions only publish ReactionTrigger
  // events (which become InputRequired{reaction_prompt} stream events) when the
  // reactor has the relevant reaction readied via this RPC.
  rpc SetReactionReady(SetReactionReadyRequest) returns (SetReactionReadyResponse);

  // ActivateFeature applies a character feature (e.g. Rage) as an in-encounter action.
  // State changes flow via the EncounterEvent stream; this is a lean ack.
  rpc ActivateFeature(ActivateFeatureRequest) returns (ActivateFeatureResponse);
}
