syntax = "proto3";

package dnd5e.api.v1alpha2.encounter;

option go_package = "github.com/KirkDiggler/rpg-api-protos/gen/go/dnd5e/api/v1alpha2/encounter;encounterpb";
option java_multiple_files = true;
option java_package = "com.kirkdiggler.rpg.api.dnd5e.v1alpha2.encounter";

// =============================================================================
// Common primitives
// =============================================================================

// Ref is a typed reference to a piece of toolkit content.
// module/type/id triple disambiguates across rulebooks and prevents id collisions.
// Used everywhere the wire identifies a typed thing (combat_abilities, actions, monster,
// feature, condition, damage type, item, ...). NOT used for runtime instance ids
// (encounter_id, entity_id) — those stay strings. The `type` field is open-ended; the
// toolkit grows the vocabulary and the wire carries its native namespaces verbatim (e.g.
// the two-level economy's combat_abilities:* intent and actions:* doing are both `type`
// values — never flattened on the wire).
message Ref {
  string module = 1; // "dnd5e", future: "artificer", "homebrew-x"
  string type = 2; // "monster", "feature", "condition", "combat_abilities", "actions", "spell", "item", "damage", ...
  string id = 3; // "goblin", "rage", "dodging", "attack"
}

// Position uses hex cube coordinates with the invariant x + y + z == 0.
// Coordinates are dungeon-absolute on the wire — no room-local coords ever.
message Position {
  int32 x = 1;
  int32 y = 2;
  int32 z = 3;
}

// HitPoints is the destructibility shape carried on Entity when the entity has HP.
// Non-destructible entities omit the optional Entity.hp field entirely.
message HitPoints {
  int32 current = 1;
  int32 max = 2;
  int32 temp = 3;
}

// =============================================================================
// Enums
// =============================================================================

// EncounterMode determines the rule-set in effect for the encounter.
// Mode flips happen within a single encounter; the encounter persists across the transition.
enum EncounterMode {
  ENCOUNTER_MODE_UNSPECIFIED = 0;
  ENCOUNTER_MODE_FREE_ROAM = 1;
  ENCOUNTER_MODE_TURN_BASED = 2;
}

// EntityType is the discriminator for what kind of thing an Entity is.
// Used for client-side dispatch (rendering, default interactions). Toolkit content
// identification still uses Ref inside the type-specific data messages.
enum EntityType {
  ENTITY_TYPE_UNSPECIFIED = 0;
  ENTITY_TYPE_CHARACTER = 1;
  ENTITY_TYPE_MONSTER = 2;
  ENTITY_TYPE_OBSTACLE = 3;
  ENTITY_TYPE_TRAP = 4;
  ENTITY_TYPE_PROP = 5;
  ENTITY_TYPE_NPC = 6;
}

// TerrainType describes per-hex movement properties.
// Walkability per entity (e.g. flying over VOID, swimmer through WATER) is server-evaluated.
enum TerrainType {
  TERRAIN_TYPE_UNSPECIFIED = 0;
  TERRAIN_TYPE_FLOOR = 1;
  TERRAIN_TYPE_ROUGH = 2;
  TERRAIN_TYPE_DIFFICULT = 3;
  TERRAIN_TYPE_VOID = 4;
  TERRAIN_TYPE_WATER = 5;
}

// WallKind describes what a wall segment is.
// DOOR_CLOSED transitions to DOOR_OPEN via the DoorOpened event; the segment stays
// in the wall list with a different kind so closing it is a state change, not a removal.
enum WallKind {
  WALL_KIND_UNSPECIFIED = 0;
  WALL_KIND_SOLID = 1;
  WALL_KIND_DOOR_CLOSED = 2;
  WALL_KIND_DOOR_OPEN = 3;
  WALL_KIND_WINDOW = 4;
  // A closed door that requires unlocking before it can be opened. Distinct from
  // DOOR_CLOSED so the client can render locked-ness instead of discovering it on click.
  WALL_KIND_DOOR_LOCKED = 5;
}

// TrapState is carried on TrapData entities so visible state matches what the player
// should see.
enum TrapState {
  TRAP_STATE_UNSPECIFIED = 0;
  TRAP_STATE_ARMED = 1;
  TRAP_STATE_TRIGGERED = 2;
  TRAP_STATE_DISARMED = 3;
}

// EconomySlot is which action-economy slot an AvailableAction draws from, so the web can
// GROUP the menu by slot (TakeAction wave). Toolkit-authored — rpg-api copies it through,
// the web never derives it from rules. Maps from the toolkit's action type; a granted-
// capacity action (e.g. an off-hand strike) carries the slot of the capacity it spends.
enum EconomySlot {
  ECONOMY_SLOT_UNSPECIFIED = 0;
  ECONOMY_SLOT_ACTION = 1;
  ECONOMY_SLOT_BONUS_ACTION = 2;
  ECONOMY_SLOT_REACTION = 3;
  ECONOMY_SLOT_MOVEMENT = 4;
  ECONOMY_SLOT_FREE = 5;
}

// TargetKind tells the UI which targeting prompt to raise for an AvailableAction without
// the web knowing any rules (TakeAction wave). Toolkit-authored. Attack/strike =
// SINGLE_ENTITY, Dodge = SELF, move = POSITION, a fireball = AREA, Dash = NONE.
//
// SELF/SINGLE_ENTITY/POSITION/AREA correspond to the ActionTarget oneof arms (service.proto):
// the web reads target_kind on the menu entry, raises the matching prompt, and fills the
// matching ActionTarget.kind in the request.
//
// Two values have no ActionTarget arm and are deliberate:
//   - UNSPECIFIED (0): the toolkit did not set a kind — treat as a defect (a bug to surface).
//   - NONE (5): the action is deliberately untargeted — fire it with no prompt and an
//     empty/self ActionTarget. Distinct from SELF: a SELF action (Dodge) targets the actor
//     (a self-buff lands on them), whereas a NONE action (Dash) targets nothing at all.
//     Collapsing them would lose that the web should confirm-self for Dodge but prompt-
//     nothing for Dash. The toolkit owns this distinction; the proto mirrors its enum 1:1
//     so rpg-api projects target_kind field-for-field with no translation conditional.
enum TargetKind {
  TARGET_KIND_UNSPECIFIED = 0;
  TARGET_KIND_SELF = 1;
  TARGET_KIND_SINGLE_ENTITY = 2;
  TARGET_KIND_POSITION = 3;
  TARGET_KIND_AREA = 4;
  TARGET_KIND_NONE = 5;
}

// =============================================================================
// Space — flat hex map with optional zones
// =============================================================================

// Hex is one cell of the player's view of the map.
// Sticky once revealed: stays in Space.hexes for the rest of the campaign for that character.
message Hex {
  Position position = 1;
  TerrainType terrain = 2;
  string zone_id = 3; // optional zone membership ("" if none)
}

// Wall is a barrier between two adjacent hexes.
// Doors are walls with a DOOR_* kind; opening a door changes the kind, not the wall's
// existence.
message Wall {
  Position from = 1;
  Position to = 2;
  WallKind kind = 3;
  optional string id = 4; // present on interactable walls (doors); the web passes it as
  // InteractRequest.target_entity_id to bridge a door click to Interact. Absent on plain
  // solid/window walls, which have nothing to interact with.
}

// Zone is optional metadata attached to a region of hexes.
// Used for ambient cues (lighting, music), narration moments ("you entered the throne
// room"), and scripted triggers. Zones do NOT structure the map for movement or rendering
// — that's all flat-hex.
message Zone {
  string id = 1;
  string name = 2;
  // archetype identifies this zone's room function from the toolkit's fixed, reusable
  // vocabulary (rpg-toolkit RegionArchetype: "entrance", "chamber", "corridor", "boss" —
  // rpg-toolkit#814) — NOT a per-generator or per-theme ad hoc value. The vocabulary may
  // grow additively through the toolkit contract over time, but individual generators
  // select from that shared set rather than inventing their own values. String, not an
  // enum, because the toolkit — not this proto — owns and versions the vocabulary. ""
  // means the generator did not tag this zone with an archetype; consumers fall back to
  // undifferentiated handling (no archetype-specific dressing or behavior). Distinct from
  // Space.theme: archetype is per-zone role drawn from the fixed vocabulary, theme is the
  // dungeon-wide opaque visual family with no fixed vocabulary at all.
  string archetype = 3;
  // Future ambient hooks (lighting profile ref, music cue ref, trigger refs) will be
  // added with new field numbers as needed.
}

// StatusEffect is the wire-shape of toolkit's core.Effect (called Condition in the dnd5e
// rulebook). Carries display payload only; the reactive mechanism stays server-side.
message StatusEffect {
  Ref source = 1; // {module:"dnd5e", type:"condition", id:"poisoned"}
  string display_name = 2;
  string icon_hint = 3; // UI category — actual asset path resolved web-side
  optional int32 duration_rounds = 4;
}

// Space is the player's current view of the world.
// Continuous flat hex map — no rooms on the wire. Zones and theme are optional metadata;
// neither structures the map for movement or rendering.
// Visibility:
//   - hexes and walls are sticky (explored geometry persists per character across the
//     campaign)
//   - entities are real-time LOS (server filters per player per event)
message Space {
  repeated Hex hexes = 1; // explored, sticky
  repeated Wall walls = 2; // explored
  repeated Entity entities = 3; // currently visible (LOS-filtered)
  repeated Zone zones = 4; // optional metadata
  // theme is the dungeon-wide visual dressing family (e.g. "crypt"), carried once at the
  // Space level — opaque to this contract, not an enum; the asset/dressing layer owns the
  // vocabulary. Distinct from Zone.archetype: theme is one visual family for the whole
  // encounter, archetype is per-zone room function drawn from the toolkit's fixed, shared
  // vocabulary. "" means the generator did not tag a theme; consumers fall back to
  // default/no dressing.
  string theme = 5;
}

// =============================================================================
// Entity — common shape + typed data oneof
// =============================================================================

// Entity is anything that can occupy a position in the space.
// Common shape (id, position, type, display_name, optional hp, armor_class,
// status_effects) is what every entity carries because every entity is
// destructible-or-not and has-or-doesn't-have visible statuses.
// The oneof carries the type-specific rich data.
message Entity {
  string id = 1; // runtime instance id; not a Ref
  Position position = 2;
  EntityType type = 3;
  string display_name = 4;
  optional HitPoints hp = 5; // present only on destructibles
  repeated StatusEffect status_effects = 6; // visible only
  optional int32 armor_class = 7; // present for characters and monsters; absent for props/obstacles

  oneof data {
    CharacterData character = 10;
    MonsterData monster = 11;
    ObstacleData obstacle = 12;
    TrapData trap = 13;
    PropData prop = 14;
    NpcData npc = 15;
  }
}

// CharacterData — player-controlled character.
//
// Equipment on the wire (protos#187): equipped/inventory/slots/armor_class_detail ride
// this message because the character HUD/sheet reads them off the same hydrated
// CharacterData the encounter already snapshots — no separate fetch on popover open
// (rpg-dnd5e-web#531 CONTRACT.md §8: a second source of truth would disagree with the
// encounter's view of the character). In-encounter equip changes push updated
// CharacterData on the encounter stream like any other state change; the character-scoped
// EquipItem/UnequipItem RPCs (dnd5e.api.v1alpha2.character.CharacterService) are for the
// out-of-encounter sheet and return this same message — one shape, no conversion layer.
message CharacterData {
  Ref class_ref = 1; // {module:"dnd5e", type:"class", id:"fighter"}
  Ref race_ref = 2;
  string player_id = 3; // who controls this character
  // level still TODO — see rpg-api-protos#183

  // equipped maps slot key -> the Ref of the item worn/wielded there. Slot keys are opaque
  // strings to the web (defined by `slots` below). Item display fields are looked up by Ref
  // against `inventory`, which carries the same item's full entry — no separate
  // "EquippedItem" wrapper, one representation for an item whether worn or carried.
  map<string, Ref> equipped = 4;

  // inventory is every item the character owns, INCLUDING currently equipped ones (an
  // equipped item's entry here is what `equipped[slot_key]` points at). Excluding equipped
  // items would force the web to merge two lists to render a full owned-items view; this
  // way one list is the source of truth and `equipped` is purely a slot index into it.
  repeated Item inventory = 5;

  // slots is the character's equip-socket taxonomy, server-owned so classes/homebrew can
  // add slots without a web release. The web renders whatever arrives and filters by
  // Item.slot_keys / SlotDef.accepts — it never hardcodes slot keys.
  repeated SlotDef slots = 6;

  // armor_class_detail is the sheet/HUD's AC readout: total plus a server-composed note
  // (e.g. "16 chain mail + 2 shield", "10 + DEX + CON (Unarmored Defense)"). The toolkit
  // composes `note` as a display projection over EffectiveAC(); rpg-api and the web pass it
  // through verbatim — the web must never assemble an AC breakdown from rules data.
  //
  // Why this duplicates Entity.armor_class (field 7 above) rather than replacing it: the
  // character-scoped EquipItem/UnequipItem RPCs (dnd5e.api.v1alpha2.character) return a
  // bare CharacterData with no surrounding Entity — armor_class_detail.total is the ONLY AC
  // total available out-of-encounter, there's nowhere else to put it on that response.
  // Inside an encounter snapshot, where CharacterData does ride inside an Entity, rpg-api
  // keeps the two in sync (armor_class_detail.total == Entity.armor_class); Entity.armor_class
  // stays the flat cross-entity value other entity types (monsters) use with no note at all.
  ArmorClassDisplay armor_class_detail = 7;

  // main_hand_damage is the resolved main-hand damage display (contract §5) — occupancy-
  // dependent (versatile/two-handed/off-hand vary the string) so it can't be read off
  // Item.stat_line, which is the item's own static stat line. Server-composed, rendered
  // verbatim, sibling of armor_class_detail. Toolkit's EquipmentView composes it; rpg-api
  // passes it through.
  string main_hand_damage = 8;
}

// Item is a display-ready piece of equipment or gear. Every field beyond `ref`/`name` is
// server-composed and opaque to the web: stat_line/icon_key/kind/slot_keys carry an open
// vocabulary the toolkit and asset manifest own. The web renders these verbatim and never
// derives them from rules data (no client-side damage dice, no client-side AC math).
message Item {
  Ref ref = 1; // {module:"dnd5e", type:"item", id:"longsword"}
  string name = 2;
  string stat_line = 3; // server-composed: "1d8 slashing · versatile", "AC 16 · heavy"
  string icon_key = 4; // reference key into the asset-owned manifest — keys, not enums
  string kind = 5; // "weapon" | "shield" | "armor" | "gear" — open vocabulary, not an enum
  repeated string slot_keys = 6; // slot keys this item may occupy, e.g. ["main_hand", "off_hand"]
}

// SlotDef is one equip socket a character exposes. Server-owned data, not a client enum —
// see CharacterData.slots.
message SlotDef {
  string key = 1; // "main_hand", "off_hand", "armor" — opaque to the web
  string display_label = 2;
  repeated string accepts = 3; // item kinds this slot accepts, e.g. ["weapon", "shield"]
}

// ArmorClassDisplay is the composed AC readout — see CharacterData.armor_class_detail.
message ArmorClassDisplay {
  int32 total = 1;
  string note = 2; // server-composed breakdown, rendered verbatim
}

// MonsterData — server-controlled monster.
message MonsterData {
  Ref monster_ref = 1; // {module:"dnd5e", type:"monster", id:"goblin"}
}

// ObstacleData — boulder, table, statue, etc.
message ObstacleData {
  Ref obstacle_ref = 1;
  bool blocks_movement = 2;
  bool blocks_line_of_sight = 3;
}

// TrapData — pit traps, dart traps, magic traps.
// appears_as is the illusion mechanic: undetected traps report a different EntityType
// to players who haven't perceived them. Server filters per player.
message TrapData {
  Ref trap_ref = 1; // {module:"dnd5e", type:"trap", id:"pit-trap"}
  TrapState state = 2;
  EntityType appears_as = 3; // FLOOR/PROP for undetected; same as `type` once perceived
}

// PropData — chest, lever, lootable, decoration.
message PropData {
  Ref prop_ref = 1;
  bool interactable = 2;
}

// NpcData — non-hostile, non-monster characters (shopkeeper, quest-giver).
message NpcData {
  Ref npc_ref = 1;
  bool hostile = 2; // can flip during encounter (e.g. betrayal)
}

// =============================================================================
// Encounter — session, mode, turn state, action economy
// =============================================================================

// Encounter is the session the player is currently inside.
// One encounter persists across mode flips — combat starting mid-exploration does not tear
// down the world; it just changes the rule-set.
message Encounter {
  string id = 1; // runtime instance id
  EncounterMode mode = 2;
  Space space = 3;
  optional TurnState turn_state = 4; // present only when mode == TURN_BASED
}

// TurnState is the action-economy and initiative payload, present only in TURN_BASED mode.
message TurnState {
  repeated string initiative_order = 1; // entity ids in order of who acts when
  string active_entity_id = 2;
  int32 round = 3; // 1-based; increments when initiative_order wraps
  ActionEconomy economy = 4;
  repeated AvailableAction available_actions = 5;
}

// ActionEconomy mirrors the toolkit's two-level model from
// rulebooks/dnd5e/combat/action_economy.go.
//
// Primary resources (action, bonus_action, reaction, movement) are universal-ish across
// turn-based rulebooks. Capacity is the rulebook-specific bag — toolkit-defined keys like
// "attacks", "off_hand_attacks", "flurry_strikes". New capacity types add new keys without
// churning the proto.
message ActionEconomy {
  int32 actions_remaining = 1;
  int32 bonus_actions_remaining = 2;
  int32 reactions_remaining = 3;
  int32 movement_remaining = 4; // in feet (toolkit-native unit)

  // Keys are toolkit-defined: "attacks", "off_hand_attacks", "flurry_strikes"
  map<string, int32> capacities = 10;
}

// AvailableAction is one entry in the server-pushed list of actions the active entity can
// take right now. Web does not compute availability — it renders the list and disables
// buttons whose `available` is false (showing `unavailable_reason` as tooltip).
//
// ref carries the toolkit's native ref verbatim (e.g. {type:"combat_abilities", id:"attack"}
// or {type:"actions", id:"strike"}); the two `type` namespaces are the toolkit's two-level
// economy and are not flattened on the wire.
message AvailableAction {
  Ref ref = 1; // {module:"dnd5e", type:"combat_abilities", id:"attack"}
  string display_name = 2;
  bool available = 3;
  string unavailable_reason = 4; // user-facing: "no movement", "out of range", ...
  EconomySlot economy_slot = 5; // which slot it draws from — web groups the menu by this
  TargetKind target_kind = 6; // which targeting prompt the UI should raise
}

// MovementInterruption is attached to an EntityMoved event when the path was cut short.
// Used so the client can animate the partial movement and surface narration.
message MovementInterruption {
  enum Reason {
    REASON_UNSPECIFIED = 0;
    REASON_OUT_OF_MOVEMENT = 1;
    REASON_TRAP_TRIGGERED = 2;
    REASON_OPPORTUNITY_ATTACK = 3;
    REASON_DIFFICULT_TERRAIN = 4; // hidden until perceived
    REASON_BLOCKED_BY_ENTITY = 5;
    REASON_BLOCKED_BY_TERRAIN = 6; // unwalkable hex on path
  }
  Reason reason = 1;
  string description = 2;
  optional Ref triggered_by = 3; // which trap, feature, ability caused it
}

// =============================================================================
// Caller-private follow-up payloads
// =============================================================================

// InputRequired is the caller-private follow-up payload returned in InteractResponse or
// TakeActionResponse when the operation needs more input from the requester (skill check,
// dialogue choice). Server tracks the pending prompt as encounter state; SubmitCheck
// implicitly resolves it. No correlation id needed on the wire.
//
// Wave 2.11d: ReactionPrompt joins as a fourth variant. Unlike the other three, a
// reaction prompt is NOT delivered as the response to the calling RPC — it rides
// the per-viewer event stream as an EncounterEvent.InputRequired event because the
// reactor isn't the caller. The reactor's stream receives the prompt; the reactor
// responds via SubmitCheck with the take_reaction field set.
message InputRequired {
  oneof kind {
    SkillCheckPrompt skill_check = 1;
    DialogueChoice dialogue = 2;
    TargetSelect target_select = 3;
    ReactionPrompt reaction_prompt = 4;
  }
}

message SkillCheckPrompt {
  int32 dc = 1;
  string ability = 2; // 5e three-letter codes: "STR", "DEX", "INT", ...
  optional Ref tool = 3; // {module:"dnd5e", type:"item", id:"thieves-tools"}
}

message DialogueChoice {
  repeated DialogueOption options = 1;
}

message DialogueOption {
  string id = 1; // option id the client echoes back via Interact again
  string text = 2;
}

message TargetSelect {
  repeated string candidate_entity_ids = 1;
}

// ReactionPrompt is the InputRequired variant pushed to a player who has a readied
// reaction whose predicate matched at an attack/movement boundary. The player chooses
// to take or skip the reaction by replying via SubmitCheck with the take_reaction field.
//
// The prompt rides the per-viewer event stream (EncounterEvent.InputRequired) projected
// to the reactor only. The mover/attacker's RPC response returns normally with phase-1
// results; the reactor's stream gets this prompt as an additional event.
//
// Per Wave 2.11d Decision Point 2 (rpg-project#47): reuse SubmitCheck for take/skip
// in this wave; defer a richer SubmitReaction RPC to a future wave when reactions need
// payloads beyond yes/no (Counterspell slot pick, Polearm Master target pick).
message ReactionPrompt {
  // The reaction the reactor is being asked to take.
  // Examples: dnd5e:conditions:opportunity_attack, dnd5e:spells:shield
  Ref reaction_ref = 1;

  // What triggered the reaction prompt. Mirrors the toolkit's TriggerKind enum
  // (rulebooks/dnd5e/events.TriggerKind): "movement_oa", "post_hit", "post_damage".
  string trigger_kind = 2;

  // The entity whose action triggered this reaction.
  // For OA: the moving entity. For Shield: the attacker.
  string trigger_source_entity_id = 3;

  // The reaction's intended target.
  // For OA: the moving entity (you OA the mover). For Shield: the reactor (you Shield yourself).
  string target_entity_id = 4;

  // Optional human-readable description for the reactor's UI.
  // Server may pre-format ("Goblin attacks you. Cast Shield (+5 AC, 1st-level slot)?").
  string display_text = 5;
}
