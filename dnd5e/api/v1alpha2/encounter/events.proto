syntax = "proto3";

package dnd5e.api.v1alpha2.encounter;

import "dnd5e/api/v1alpha2/encounter/types.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/KirkDiggler/rpg-api-protos/gen/go/dnd5e/api/v1alpha2/encounter;encounterpb";
option java_multiple_files = true;
option java_package = "com.kirkdiggler.rpg.api.dnd5e.v1alpha2.encounter";

// EncounterEvent is the unit of state delivery on the stream.
// Decision rule for adding events: events are unique because each one's payload is unique.
// Same payload → same event with a wider type, not a new event.
message EncounterEvent {
  int64 sequence = 1; // monotonic per encounter
  // Game-event time, stamped by the toolkit at publish (its event `occurred_at`),
  // NOT wire-delivery time. The toolkit owns when an event happened; rpg-api copies
  // it through, never restamps with its own wall clock (Invariant 5).
  google.protobuf.Timestamp timestamp = 2;
  // Causation key (Invariant 8). Ties every effect of one action together: an
  // ActionResolved and the AttackResolved / EntityDamaged / StatusApplied events it
  // caused all share the same correlation_id, so the toolkit-owned combat log can be
  // reassembled from the stream. Opaque runtime id the toolkit stamps per action, so
  // it's a string (not a Ref). Empty for events with no causing action (snapshot,
  // geometry reveal, etc.).
  string correlation_id = 3;

  oneof event {
    // Lifecycle
    SnapshotDelivered snapshot_delivered = 5;

    // Geometry & visibility
    GeometryRevealed geometry_revealed = 10;
    EntityAppeared entity_appeared = 11;
    EntityDisappeared entity_disappeared = 12;

    // Entity state
    EntityMoved entity_moved = 20;
    EntityDamaged entity_damaged = 21;
    EntityHealed entity_healed = 22;
    EntityDied entity_died = 23;
    EntityRemoved entity_removed = 24;
    StatusApplied status_applied = 25;
    StatusRemoved status_removed = 26;
    // The resolved-action triple (TakeAction wave). ActionResolved is the umbrella
    // beat (actor, action, economy consumed); AttackResolved carries the per-attack
    // roll detail (incl. MISS — the #594 fix). Both share the envelope correlation_id
    // with the EntityDamaged they cause, so the web reassembles the full story.
    ActionResolved action_resolved = 27;
    AttackResolved attack_resolved = 28;
    ResourceChanged resource_changed = 61;
    // The death-save arc (rpg-toolkit#742, wave KirkDiggler/rpg-project#75):
    // DeathSaveRolled fires on EVERY roll (including auto-fails from damage
    // while unconscious) so the combat log can narrate saves resolving in
    // real time; EntityStabilized fires once at the 3-success terminal
    // transition. Death itself still rides the existing EntityDied above —
    // these two only cover the beats EntityDied doesn't. Tags are next-free
    // (62/63, out of the 20s block), same convention as ResourceChanged=61.
    DeathSaveRolled death_save_rolled = 62;
    EntityStabilized entity_stabilized = 63;

    // World interaction
    DoorOpened door_opened = 30;
    DoorClosed door_closed = 31;
    LootRevealed loot_revealed = 32;
    TrapTriggered trap_triggered = 33;
    StateChanged state_changed = 34; // lever toggle, generic state mutation

    // Encounter mode + turn structure
    ModeChanged mode_changed = 40;
    InitiativeRolled initiative_rolled = 41;
    TurnStarted turn_started = 42;
    TurnEnded turn_ended = 43;
    EncounterEnded encounter_ended = 44;
    TurnStateChanged turn_state_changed = 45;

    // Dialogue
    DialogueStarted dialogue_started = 50;
    DialogueEnded dialogue_ended = 51;

    // Input prompts that arrive on the stream (rather than as the response of
    // the calling RPC). Used by Wave 2.11d reaction prompts: when phase 1 of
    // an attack publishes a ReactionTriggerEvent for a player reactor, the
    // server pushes InputRequiredDelivered onto the reactor's per-viewer
    // stream. The reactor responds via SubmitCheck{take_reaction}.
    InputRequiredDelivered input_required_delivered = 60;
  }
}

// InputRequiredDelivered carries an InputRequired prompt that the server
// is pushing onto a reactor's per-viewer stream. Wave 2.11d adds this so
// reaction prompts can be delivered to players who are not the caller of
// the action that triggered them (the mover/attacker's RPC response cannot
// carry a prompt for a different player).
//
// The InputRequired payload is the same shape used in Interact / TakeAction
// responses; clients can reuse the same prompt-modal infrastructure.
message InputRequiredDelivered {
  InputRequired input_required = 1;
}

// SnapshotDelivered is the first event on a new stream subscription. Carries the player's
// complete view so the client can render without needing to request anything else.
message SnapshotDelivered {
  Encounter encounter = 1;
}

// GeometryRevealed adds hexes/walls to the player's sticky map. Emitted when a door opens,
// when the player moves into a previously-unseen area, or when a Reveal effect is cast.
message GeometryRevealed {
  repeated Hex hexes = 1;
  repeated Wall walls = 2;
}

message EntityAppeared {
  Entity entity = 1; // came into LOS
  string reason = 2; // optional: "entered LOS", "spell reveal", "perception success"
}

message EntityDisappeared {
  string entity_id = 1;
  string reason = 2; // "left LOS", "invisibility cast"
  // Per-viewer last-known position. Different viewers may have last seen the
  // entity at different hexes (pass-through movement past two viewers in
  // different positions), so the wire form is per-stream — the encounter
  // server populates this for the specific subscriber receiving the event.
  // Required for rendering "freeze marker at last-seen hex" without
  // client-side game-state tracking.
  Position last_known_position = 3;
}

message EntityMoved {
  string entity_id = 1;
  Position from = 2;
  Position to = 3; // actual final position
  repeated Position actual_path = 4; // hex by hex, for animation
  optional Ref movement_source = 5;
  optional MovementInterruption interruption = 6;
}

// DamageComponent is a single source's contribution to a damage event.
// source is an opaque identifier: toolkit SourceRef.String() for named
// sources (e.g. "dnd5e:conditions:sneak_attack") or a category string
// ("weapon", "ability") for generic ones. amount is the component's total
// after all chain modifiers (dice + flat bonus). damage_type reuses the
// Ref shape used by EntityDamaged.damage_type. is_critical marks components
// doubled for a critical hit — useful for crit highlighting in the UI.
message DamageComponent {
  string source = 1;
  int32 amount = 2;
  Ref damage_type = 3;
  bool is_critical = 4;
}

message EntityDamaged {
  string entity_id = 1;
  int32 amount = 2;
  Ref damage_type = 3; // {module:"dnd5e", type:"damage", id:"slashing"}
  HitPoints hp_after = 4;
  optional string source_entity_id = 5;
  // Per-source breakdown. Empty when the resolver did not produce component
  // data (e.g. stand-in resolver or NPC attacks). When non-empty, the sum
  // of component amounts equals amount.
  repeated DamageComponent damage_breakdown = 6;
}

message EntityHealed {
  string entity_id = 1;
  int32 amount = 2;
  HitPoints hp_after = 3;
  optional string source_entity_id = 4;
}

message EntityDied {
  string entity_id = 1;
  optional string killer_entity_id = 2;
}

// DeathSaveRolled carries a single death save roll for an unconscious
// entity (rpg-toolkit#742). Fires on every roll, not just terminal ones —
// roll is 0 when the failure came from taking damage while unconscious
// rather than an actual d20 roll (mirrors the toolkit's own Roll==0
// convention). successes/failures are the running totals toward 3;
// stabilized/dead mark this roll as the one that crossed the respective
// threshold (stabilized also fires EntityStabilized below in the same
// correlated beat; dead also fires the existing EntityDied above).
// regained_consciousness/hp_restored cover a natural 20 (2 successes plus
// 1 HP and back up). All derived fields (is_critical_fail,
// is_critical_success, stabilized, dead, regained_consciousness) are
// copied verbatim from the toolkit's DeathSaveRolledEvent — consumers must
// never re-derive them from roll/successes/failures.
message DeathSaveRolled {
  string entity_id = 1;
  int32 roll = 2; // raw d20 result; 0 for a damage-while-unconscious auto-fail
  int32 successes = 3; // running total toward 3
  int32 failures = 4; // running total toward 3
  bool is_critical_fail = 5; // natural 1 (counts as 2 failures)
  bool is_critical_success = 6; // natural 20
  bool stabilized = 7; // this roll was the 3rd success
  bool dead = 8; // this roll was the 3rd failure
  bool regained_consciousness = 9; // natural 20: back up with 1 HP
  int32 hp_restored = 10; // HP granted by this roll (natural 20 only; 0 otherwise)
}

// EntityStabilized fires once when an unconscious entity accumulates 3
// successful death saves (rpg-toolkit#742). No killer/causer concept —
// mirrors EntityDied's shape minus the attacker.
message EntityStabilized {
  string entity_id = 1;
}

message EntityRemoved {
  string entity_id = 1;
  string reason = 2; // "destroyed", "fled", "transformed"
}

message StatusApplied {
  string entity_id = 1;
  StatusEffect status = 2;
  optional string source_entity_id = 3;
}

message StatusRemoved {
  string entity_id = 1;
  Ref status_source = 2; // matches StatusEffect.source from earlier StatusApplied
}

// ResourceChanged reports a change in a tracked resource (e.g. rage charges,
// ki points, spell slots) for an entity. The resource is identified by an opaque
// ref so new resource types ride this event without a new proto field.
// Example: {module:"dnd5e", type:"resources", id:"rage_charges"}, new_current=1, max=2.
message ResourceChanged {
  string entity_id = 1;
  Ref resource_ref = 2; // e.g. {module:"dnd5e", type:"resources", id:"rage_charges"}
  int32 new_current = 3;
  int32 max = 4;
}

// ActionResolved is the umbrella beat for a player-facing action (TakeAction wave).
// Every action a character takes emits exactly one of these as a first-class record —
// not just its scattered effects (Invariant 9). It carries WHAT was done and WHAT it
// cost; the roll/hit/miss detail of an attack lives on the correlated AttackResolved,
// and any damage on the correlated EntityDamaged. The web reassembles the full story
// from the shared envelope correlation_id.
//
// This is a uniform broadcast record — every viewer sees the same ActionResolved. The
// actor's refreshed menu is NOT carried here; it rides the separate TurnStateChanged
// event (projected for audience), keeping this a clean combat-log entry.
message ActionResolved {
  string actor_entity_id = 1; // who took the action
  // The action the actor submitted, carried as the toolkit's native ref verbatim:
  // {module:"dnd5e", type:"combat_abilities", id:"attack"} for an ability beat, or
  // {module:"dnd5e", type:"actions", id:"strike"} for a granted-capacity action.
  // The two `type` namespaces are the toolkit's two-level economy and are NOT flattened
  // on the wire — rpg-api copies the triple through, never remaps it (Invariant 2).
  Ref action_ref = 2;
  string target_entity_id = 3; // "" for self/untargeted actions (Dodge, Dash)
  EconomyConsumed economy_consumed = 4; // the real deduction the toolkit made
}

// EconomyConsumed is the action-economy delta one ActionResolved spent. Mirrors the
// toolkit's two-level model: the primary slots plus the granted-capacity map (e.g.
// {"attacks":1} when a strike consumes one granted attack, {"martial_arts_bonus":1}
// for the Monk bonus strike). The web subtracts these from the economy it holds; the
// authoritative refreshed snapshot still arrives on TurnStateChanged.
message EconomyConsumed {
  int32 actions = 1;
  int32 bonus_actions = 2;
  int32 reactions = 3;
  int32 movement = 4; // in feet (toolkit-native unit), matches ActionEconomy.movement_remaining
  map<string, int32> granted_consumed = 5; // toolkit capacity keys: "attacks", "martial_arts_bonus", ...
}

// AttackResolved carries the per-attack roll detail. Correlated to its umbrella
// ActionResolved (and to the EntityDamaged it causes on a hit) via the shared envelope
// correlation_id. The attack story is the correlated triple:
// ActionResolved (umbrella + economy) → AttackResolved (roll, hit/miss/crit) →
// EntityDamaged (HP, hit only).
//
// CRUCIAL: this fires on a MISS too (hit=false). That is the #594 fix — today a miss
// emits nothing and the story silently drops. No damage is carried here; damage lives
// on the separate EntityDamaged event published alongside on a hit.
message AttackResolved {
  string attacker_entity_id = 1;
  string target_entity_id = 2;
  bool hit = 3;
  bool critical = 4;
  int32 attack_roll = 5; // raw d20 result
  int32 attack_bonus = 6; // to-hit modifier applied
  int32 target_ac = 7; // the AC the roll was compared against
  // Copied verbatim from the toolkit's AttackResolvedEvent (rulebook's AttackResult) —
  // consumers must never recompute advantage/disadvantage from other fields.
  bool has_advantage = 8;
  bool has_disadvantage = 9;
  // The granting/imposing condition(s) (e.g. {module:"dnd5e", type:"conditions",
  // id:"dodging"}), for narration. Empty when has_advantage/has_disadvantage is false.
  repeated Ref advantage_sources = 10;
  repeated Ref disadvantage_sources = 11;
}

message DoorOpened {
  string door_entity_id = 1;
  repeated Hex revealed_hexes = 2; // full hex (terrain + zone) for newly-visible cells
  repeated Wall revealed_walls = 3;
  repeated Wall removed_walls = 4; // walls no longer present (door itself transitions
  // via DOOR_CLOSED → DOOR_OPEN; this is for any
  // genuinely-removed barriers from the open action)
}

message DoorClosed {
  string door_entity_id = 1;
}

message LootRevealed {
  string container_entity_id = 1;
  repeated Ref items = 2; // {module:"dnd5e", type:"item", id:"longsword"}
}

message TrapTriggered {
  string trap_entity_id = 1;
  string victim_entity_id = 2;
  // Damage events emitted separately; this is the narration moment.
}

message StateChanged {
  string entity_id = 1;
  string state_key = 2; // entity-specific: "lever_position", "door_locked"
  string state_value = 3;
}

message ModeChanged {
  EncounterMode from = 1;
  EncounterMode to = 2;
  string reason = 3; // narration: "ambush", "combat ended", "negotiated peace"
}

message InitiativeRolled {
  repeated string order = 1;
}

message TurnStarted {
  string entity_id = 1;
  int32 round = 2;
}

message TurnEnded {
  string entity_id = 1;
}

// TurnStateChanged pushes the active actor's refreshed turn state after an action
// mutates it — the economy decremented and the recomputed available-actions menu
// (TakeAction wave, Invariant 12: the menu never goes silently stale; refresh is
// pushed as a delta, the web never polls).
//
// Carried separately from ActionResolved on purpose: available_actions is the active
// actor's menu, so this event is projected for audience (it goes to whoever needs the
// menu), whereas ActionResolved is a uniform broadcast record. Correlated to the
// triggering ActionResolved via the shared envelope correlation_id.
//
// The web swaps in this TurnState wholesale — toolkit computes it, rpg-api projects it
// field-for-field, the web renders it. No availability is recomputed client-side.
message TurnStateChanged {
  TurnState turn_state = 1; // recomputed economy + available_actions
}

message EncounterEnded {
  string reason = 1;
}

message DialogueStarted {
  string with_entity_id = 1;
}

message DialogueEnded {
  string with_entity_id = 1;
}
